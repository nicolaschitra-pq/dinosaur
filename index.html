<!DOCTYPE html>
<html>
<head>
    <title>Form Pendaftaran</title>
    <link rel="stylesheet" href="Summative 2 2026CSS.css">
</head>
<body>
<div class="container">
	<h2>Form Pendaftaran</h2>
	<label> Nama: </label>
		<input type="text" id="nama">
	<label> Kelas: </label>
		<input type="text" id="kelas">
	<label> Umur: </label>
	<label>
		<input type="checkbox" name="umur" value="10-12 tahun"> 10-12 tahun
	</label>
	<label>
		<input type="checkbox" name="umur" value="13-15 tahun"> 13-15 tahun
	</label>
	<label>
		<input type="checkbox" name="umur" value="16-17 tahun"> 16-17 tahun
	</label>

	<label> Kelamin: </label>
	<label>
		<input type="radio" name="kelamin" value="Laki-laki"> Laki-laki
	</label>
	<label>
		<input type="radio" name="kelamin" value="Perempuan"> Perempuan
	</label>
	<label> Tingkatan: </label>
	<label>
		<input type="radio" name="tingkatan" value="SD"> SD
	</label>
	<label>
		<input type="radio" name="tingkatan" value="SMP"> SMP
	</label>
	<label>
		<input type="radio" name="tingkatan" value="SMA"> SMA
	</label>
<button id="clearBTN">Clear</button>
<button id="okBTN">Ok</button>
</form>

<label> Hasil: </label>
<div id="hasil"></div>

<script src="Summative 2 2026JS.js"></script>

</body>
</html>
